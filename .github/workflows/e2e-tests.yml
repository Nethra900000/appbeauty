name: Automated E2E, Vulnerability, Unit & Deployment Tests (300 Test Cases)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-testing:
    name: Run 300 E2E, Vulnerability, Unit & Deployment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Google Chrome (Stable)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Execute Automated Test Suite (300 Test Cases)
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/test_suite.py
        continue-on-error: false

      - name: Generate HTML Test Report
        if: always()
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/generate_html_report.py

      - name: Upload Excel Report (.xlsx)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_Excel_XLSX
          path: E2E_Test_Report_AppBeauty*.xlsx
          retention-days: 30

      - name: Upload HTML Report (Open in Browser)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_HTML_Browser
          path: E2E_Test_Report_AppBeauty.html
          retention-days: 30

      - name: Print Test Summary
        if: always()
        run: |
          echo "=============================================="
          echo "  AI BEAUTY GENIUS - TEST SUITE COMPLETE"
          echo "  300 Test Cases Executed"
          echo "  Categories: UI/UX | Functional | Unit/API"
          echo "             Validation | Security | Deployment"
          echo "=============================================="
