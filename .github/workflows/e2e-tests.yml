name: solenium test for web app

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e-testing:
    name: web app solenium testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome & ChromeDriver via setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Execute Automated Test Suite (300 Test Cases)
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/test_suite.py

      - name: Generate HTML Test Report
        if: always()
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/generate_html_report.py

      - name: Upload Excel Report (.xlsx)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_Excel_XLSX
          path: E2E_Test_Report_AppBeauty*.xlsx
          retention-days: 30

      - name: Upload HTML Report (Open in Browser)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_HTML_Browser
          path: E2E_Test_Report_AppBeauty.html
          retention-days: 30

      # We need to rename the report to index.html for it to serve correctly on Pages
      - name: Setup HTML for Pages
        if: always()
        run: |
          mkdir -p public
          cp E2E_Test_Report_AppBeauty.html public/index.html

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Print Test Summary
        if: always()
        run: |
          echo -e "\e[32m==============================================\e[0m"
          echo -e "\e[32m  AI BEAUTY GENIUS - TEST SUITE COMPLETE\e[0m"
          echo -e "\e[32m  300 Test Cases Executed\e[0m"
          echo -e "\e[32m  Categories: UI/UX | Functional | Unit/API\e[0m"
          echo -e "\e[32m             Validation | Security | Deployment\e[0m"
          echo -e "\e[32m==============================================\e[0m"

  deploy-pages:
    name: Deploy Test Report to GitHub Pages
    needs: e2e-testing
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
