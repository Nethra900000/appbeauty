name: Automated Selenium E2E & Vulnerability Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-testing:
    name: Run 105 E2E, Vulnerability, Unit & Deployment Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome & Headless Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3 chromium-browser

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Execute Automated Test Suite (105 Test Cases)
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/test_suite.py

      - name: Generate HTML Test Report
        env:
          APP_URL: "https://nethra900000.github.io/appbeauty/"
          API_URL: "https://facial-face.onrender.com"
          PYTHONPATH: "tests"
        run: |
          python tests/generate_html_report.py

      - name: Upload Excel Report (.xlsx)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_Excel_XLSX
          path: E2E_Test_Report_AppBeauty*.xlsx
          retention-days: 30

      - name: Upload HTML Report (Open in Browser)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: E2E_Test_Report_HTML_Browser
          path: E2E_Test_Report_AppBeauty.html
          retention-days: 30
